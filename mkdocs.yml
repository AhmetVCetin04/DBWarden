site_name: DBWarden Documentation
site_description: Database migration system for Python/SQLAlchemy projects
site_author: Emiliano Gandini Outeda
repo_url: https://github.com/emiliano-gandini-outeda/dbwarden
edit_uri: edit/main/docs

theme:
  name: material
  favicon: assets/icon.png
  palette:
    primary: indigo
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Getting Started:
      - Introduction: getting-started/introduction.md
      - Installation: installation.md
      - First Steps: getting-started/first-steps.md
  - Configuration:
      - Overview: configuration/index.md
      - Quick Start: configuration/quick-start.md
      - Concepts: configuration/concepts.md
      - Connection URLs: configuration/connection-urls.md
      - Model Discovery: configuration/model-discovery.md
      - Dev Mode: configuration/dev-mode.md
      - Multi-Database: configuration/multi-database.md
      - Production Patterns: configuration/production-patterns.md
      - Troubleshooting: configuration/troubleshooting.md
      - Legacy Docs: configuration.md
  - User Guide:
      - Your First Migration: tutorial/your-first-migration.md
      - Applying Migrations: tutorial/applying-migrations.md
      - Rolling Back: tutorial/rolling-back.md
      - Checking Status: tutorial/checking-status.md
      - Dev Mode: tutorial/dev-mode.md
      - Multi-Database Setup: tutorial/multi-database-setup.md
  - FastAPI Integration:
      - Overview: fastapi/index.md
      - Tutorial:
          - First Steps: fastapi/tutorial/first-steps.md
          - Session Dependency: fastapi/tutorial/session-dependency.md
          - Startup Checks: fastapi/tutorial/startup-checks.md
          - Health Endpoints: fastapi/tutorial/health-endpoints.md
          - Complete Application: fastapi/tutorial/complete-application.md
      - Advanced:
          - Multi-Database: fastapi/advanced/multi-database.md
          - Testing: fastapi/advanced/testing.md
          - Transaction Management: fastapi/advanced/transaction-management.md
          - Engine Lifecycle: fastapi/advanced/engine-lifecycle.md
          - Production Patterns: fastapi/advanced/production-patterns.md
      - Concepts: fastapi/concepts.md
      - API Reference: fastapi/reference.md
      - Legacy Docs:
          - Overview (Old): fastapi/overview.md
          - get_session (Old): fastapi/get-session.md
          - migration_context (Old): fastapi/migration-context.md
          - DBWardenHealthRouter (Old): fastapi/health-router.md
          - Full Example (Old): fastapi/full-example.md
  - Advanced User Guide:
      - Migration File Format: migration-files.md
      - SQL Translation: sql-translation.md
      - Migration Locking: advanced/migration-locking.md
      - Checksum Integrity: advanced/checksum-integrity.md
      - Squashing Migrations: advanced/squashing-migrations.md
      - CI/CD Patterns: advanced/ci-cd-patterns.md
      - Safe Deployment: advanced/safe-deployment.md
  - Reference:
      - CLI Reference:
          - Overview: cli-reference.md
          - init: commands/init.md
          - settings/database: commands/database.md
          - make-migrations: commands/make-migrations.md
          - new: commands/new.md
          - migrate: commands/migrate.md
          - rollback: commands/rollback.md
          - history: commands/history.md
          - status: commands/status.md
          - check-db: commands/check-db.md
          - diff: commands/diff.md
          - squash: commands/squash.md
          - lock/unlock: commands/lock.md
          - version: commands/version.md
      - Supported Databases: databases.md
      - Configuration API: reference/configuration-api.md
      - Architecture: architecture-deep-dive.md
      - SQLAlchemy Models: models.md
      - Migrate from TOML: reference/migrate-from-toml.md

markdown_extensions:
  - admonition
  - codehilite
  - tables
  - toc:
      permalink: true
